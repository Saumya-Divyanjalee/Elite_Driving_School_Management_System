hibernate.connection.driver_class=com.mysql.cj.jdbc.Driver
hibernate.connection.url=jdbc:mysql://localhost:3306/elite_driving_school?createDatabaseIfNotExist=true
hibernate.connection.username=root
hibernate.connection.password=root

hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=true
hibernate.hbm2ddl.auto=update

#   Fail fast on lock ? don't hang UI for 50 seconds (5000ms = 5s)
jakarta.persistence.lock.timeout=5000

#   Limit pool size so stale sessions don't pile up
hibernate.connection.pool_size=5